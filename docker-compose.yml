services:
  postgres:
    image: postgres:16-alpine
    container_name: civic-voice-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: civic_voice
    ports:
      - "5432:5432"
    volumes:
      - civic_voice_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  civic_voice_pgdata:
